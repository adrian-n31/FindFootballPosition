<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezultate Scouting - Football Scout AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 60px 0;
            margin-bottom: -50px;
        }
        .main-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            padding: 30px;
        }
        .result-item {
            border-left: 5px solid #27ae60;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }
        .result-item:hover {
            transform: translateX(10px);
            background-color: #f1fcf4;
        }
        .match-percentage {
            font-size: 1.5rem;
            font-weight: bold;
            color: #27ae60;
        }
        #chart-container {
            max-width: 450px;
            margin: 0 auto 40px auto;
        }
        .best-fit-badge {
            background-color: #f1c40f;
            color: #2c3e50;
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="header-section text-center">
    <div class="container">
        <h1 class="display-4 fw-bold text-white">Your best positon is...</h1>
        <p class="lead">Analysis completed for: <strong th:text="${userName}">Adrian</strong></p>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="main-card">

                <div id="chart-container">
                    <h4 class="text-center mb-4 text-muted">Your Attributes Profile</h4>
                    <canvas id="radarChart"></canvas>
                </div>

                <hr class="my-5">

                <h3 class="mb-4 text-dark fw-bold text-center">Top Recommended Positions</h3>

                <div class="row g-3">
                    <div th:each="rec, iterStat : ${results}" class="col-12">
                        <div class="card result-item p-4 shadow-sm">
                            <div class="row align-items-center">
                                <div class="col-md-7">
                                    <div class="d-flex align-items-center">
                                        <div class="h2 me-4 text-success fw-bold" th:text="${iterStat.count}">1</div>
                                        <div>
                                            <div th:if="${iterStat.first}" class="best-fit-badge mb-1">Best Fit</div>
                                            <h4 class="mb-0 fw-bold text-dark" th:text="${rec.positionName}">Striker</h4>
                                            <p class="mb-0 text-muted small text-uppercase"></p>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-5 text-end">
                                    <div class="match-percentage mb-1">
                                        <span th:text="${rec.matchPercentage}">95</span>% <small style="font-size: 0.9rem">Match</small>
                                    </div>
                                    <div class="progress" style="height: 8px;">
                                        <div class="progress-bar bg-success" role="progressbar"
                                             th:style="'width: ' + ${rec.matchPercentage} + '%'"
                                             th:aria-valuenow="${rec.matchPercentage}"
                                             aria-valuemin="0" aria-valuemax="100">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <a href="/" class="btn btn-outline-primary btn-lg px-5 shadow-sm">Try Other Attributes</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    const userStats = /*[[${userStats}]]*/ {};

    const ctx = document.getElementById('radarChart').getContext('2d');

    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['PACE', 'SHOOTING', 'PASSING', 'DRIBBLING', 'DEFENDING', 'PHYSICAL'],
            datasets: [{
                label: 'Jucător: ' + /*[[${userName}]]*/ 'Nume Jucător',
                data: [
                    userStats.PACE,
                    userStats.SHOOTING,
                    userStats.PASSING,
                    userStats.DRIBBLING,
                    userStats.DEFENDING,
                    userStats.PHYSICAL
                ],
                fill: true,
                backgroundColor: 'rgba(42, 82, 152, 0.2)',
                borderColor: 'rgb(42, 82, 152)',
                pointBackgroundColor: 'rgb(42, 82, 152)',
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: 'rgb(42, 82, 152)'
            }]
        },
        options: {
            scales: {
                r: {
                    angleLines: { display: true },
                    suggestedMin: 0,
                    suggestedMax: 100,
                    ticks: { display: false, stepSize: 20 }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
</script>

</body>
</html>
